server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # /afiliados → serve o afiliados-hub e reescreve /assets/ → /afiliados/assets/
    location /afiliados {
        rewrite ^/afiliados/?(.*)$ /$1 break;
        set $up "http://app_afiliados:80";
        proxy_pass $up;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript application/json;
        sub_filter 'src="/assets/' 'src="/afiliados/assets/';
        sub_filter 'href="/assets/' 'href="/afiliados/assets/';
        sub_filter '"/favicon.svg"' '"/afiliados/favicon.svg"';
        sub_filter 'from "/' 'from "/afiliados/';
        sub_filter '"/api/' '"/api/';
    }

    # /r/CODIGO → mapeia para /afiliados/r/CODIGO (links curtos do app antigo)
    location /r/ {
        rewrite ^/r/(.*)$ /$1 break;
        set $up_r "http://app_afiliados:80";
        proxy_pass $up_r;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript;
        sub_filter 'src="/assets/' 'src="/afiliados/assets/';
        sub_filter 'href="/assets/' 'href="/afiliados/assets/';
    }

    # /api/* → backend
    location /api/ {
        set $up_api "http://app_api:8080";
        proxy_pass $up_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # /uploads/* → backend
    location /uploads/ {
        set $up_up "http://app_api:8080";
        proxy_pass $up_up;
        proxy_set_header Host $host;
    }

    # Assets da landing
    location /assets/ {
        expires 30d;
        try_files $uri =404;
    }

    # Landing page (raiz)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
