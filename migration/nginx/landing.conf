server {
    listen 3000;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # /afiliados/* → afiliados-hub (projeto separado, construído com BASE_PATH=/afiliados/)
    # nginx retira o prefixo /afiliados/ antes de repassar ao container afiliados
    location /afiliados {
        rewrite ^/afiliados/?(.*)$ /$1 break;
        set $up_afiliados "http://gotaxi-afiliados:80";
        proxy_pass $up_afiliados;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /r/CODIGO → redireciona para /afiliados/r/CODIGO (atalho legado)
    location ~* ^/r/(.+)$ {
        return 301 /afiliados/r/$1;
    }

    # /api/* → backend
    location /api/ {
        set $up_api "http://gotaxi-api:8080";
        proxy_pass $up_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    # /uploads/* → backend
    location /uploads/ {
        set $up_uploads "http://gotaxi-api:8080";
        proxy_pass $up_uploads;
        proxy_set_header Host $host;
    }

    # Tudo mais → landing page (serve.js Node, escuta na porta 3001 interna)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
